<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spēle 41</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>

<body>
    <div id="menu-screen">
        <div class="menu-box">
            <h1>Spēles iestatījumi</h1>
            <p class="subtitle">Pielāgojiet spēles iestatījumus</p>

            <div class="form-group">
                <label for="select-points">Punktu skaits:</label>
                <input name="numP" type="range" min="5" max="15" value="5" class="slider" id="select-points">
                <div class="range-value"><span id="points-value">5</span> punkti</div>
            </div>

            <div class="form-group">
                <label for="player-1-select">Pirmais spēlētājs:</label>
                <select name="player-1" id="player-1-select">
                    <option value="human" selected>Cilvēks</option>
                    <option value="minmax">Minimax</option>
                    <option value="alpha-beta">Alpha-Beta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="player-2-select">Otrais spēlētājs:</label>
                <select name="player-2" id="player-2-select">
                    <option value="human">Cilvēks</option>
                    <option value="minmax" selected>Minimax</option>
                    <option value="alpha-beta">Alpha-Beta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="maxDepthInput">Meklēšanas dziļums:</label>
                <input type="number" id="maxDepthInput" min="1" value="2" max="10" />
            </div>

            <button type="button" class="start-button" id="start-button">Sākt spēli</button>
        </div>
    </div>
    <div id="game-screen">
        <div class="game-layout">
            <div class="game-sidebar">
                <h3>Pašreizējais statuss</h3>

                <div class="game-info">
                    <p>Pašreizējais spēlētājs:</p>
                    <p><span id="current_player">-</span></p>
                </div>

                <div class="game-info">
                    <p>Vai līnija krustoss citas?:</p>
                    <p><span id="about_to_intersect">Nē</span></p>
                </div>

                <h3>Soda punkti</h3>
                <div id="score-display"></div>

                <div class="sidebar-buttons">
                    <button type="button" id="reset-button">Jauna spēle</button>
                    <button type="button" id="menu-from-game-button">Atpakaļ uz iestatījumiem</button>
                </div>
            </div>

            <div class="game-main">
                <canvas id="drawBoard" height="720" width="1280"></canvas>
            </div>
        </div>
    </div>
    <div id="results-screen">
        <div class="results-box">
            <div id="close-results-button">X</div>
            <h1>Spēle ir beigusies</h1>
            <div class="winner-name" id="winner-display">-</div>

            <div class="final-scores" id="final-scores-container"></div>

            <div class="results-buttons">
                <button type="button" id="play-again-button">Spēlēt atkal</button>
                <button type="button" id="menu-button">Atpakaļ uz iestatījumiem</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
