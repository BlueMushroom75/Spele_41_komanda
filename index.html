<!DOCTYPE html>
<html>
    <head>
        <style>
            
        </style>
    </head>
    <body>
        <div>
            <div>
                <label for="contour">Kontūra:</label>
                <select name="contour" id="select-contour">
                    <option value="circle">Aplis</option>
                    <option value="square">Kvadrāts</option>
                    <option value="triangle">Trīsstūris</option>
                </select>
                <label for="numP">Savienojamo Punktu skaits:</label>
                    <input name="numP" type="range" min="5" max="15" value="5" class="slider" id="select-points">
                </select>
            </div>
            <div>
                <label for="player-1">Speletajs 1:</label>
                <select name="player-1" id="player-1-select">
                    <option value="human" selected>Cilveks</option>
                    <option value="minmax">Minmaks</option>
                    <option value="alpha-beta">Alfa-beta</option>
                </select>
            </div>
            <div>
                <label for="player-2">Speletajs 2:</label>
                <select name="player-2" id="player-2-select">
                    <option value="human">Cilveks</option>
                    <option value="minmax" selected>Minmaks</option>
                    <option value="alpha-beta">Alfa-beta</option>
                </select>
            </div>
            <div>
                <label for="searchDepth">Meklēšanas dziļums:</label>
                <input type="number" id="maxDepthInput" min="1" value="2" max="10"/>
            </div>
            <div>
                <label for="searchDepthDynamic">Dinamisks dziļums?</label>
                <input type="checkbox" id="searchDepthDynamic"/>
            </div>
            <div id="score-display" style="white-space: pre-line;"></div>
            <div>
                <p style="margin-top: 10px;">Pašreizējais spēlētājs: <span id="current_player"></span></p>
            </div>
            <div>
                <p style="margin-top: 10px;">Pāries pāri: <span id="about_to_intersect">0</span></p>
            </div>
            
        </div>
        <div>
            <canvas id="drawBoard" height="720px" width="1280px"></canvas>
        </div>
        <div>
            <button type="button" id="reset-button">RESET</button>
        </div>

        <script src="main.js"></script>
    </body>
</html>
